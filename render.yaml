services:
  - type: web
    name: doclisten
    env: python
    plan: free
    buildCommand: "python3 -m py_compile server.py"
    startCommand: "python3 server.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DOC_LISTEN_PAYMENT_PROVIDER
        value: kakao-openchat
      - key: DOC_LISTEN_BETA_PRICE_LABEL
        value: 월 4,900원 · 카카오톡 베타 신청
      - key: DOC_LISTEN_PAYMENT_URL
        value: https://open.kakao.com/o/sKDe1RBi
