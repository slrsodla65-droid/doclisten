services:
  - type: web
    name: doclisten
    env: python
    plan: starter
    buildCommand: "python3 -m py_compile server.py"
    startCommand: "python3 server.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DOC_LISTEN_PAYMENT_PROVIDER
        value: kakao-openchat
      - key: DOC_LISTEN_BETA_PRICE_LABEL
        value: 월 4,900원 · 카카오톡 베타 신청
      - key: DOC_LISTEN_PAYMENT_URL
        value: https://open.kakao.com/o/sKDe1RBi
      # 입금 확인 후 유료 해제에 사용할 1회용 코드는 Render 대시보드에서 Secret 환경변수로 설정합니다.
      # 쉼표로 여러 개를 넣으면 각 코드는 서로 다른 사용자에게 한 번만 사용됩니다.
      # - key: DOC_LISTEN_BETA_ACCESS_CODES
      #   sync: false
      # 단일 공용 코드를 쓰는 기존 방식도 지원하지만, 유료 베타 운영에는 위 1회용 코드 목록을 권장합니다.
      # - key: DOC_LISTEN_BETA_ACCESS_CODE
      #   sync: false
      # 운영자 이메일은 Google 로그인으로 인증된 경우에만 admin 플랜으로 전환됩니다. 여러 개는 쉼표로 구분합니다.
      # - key: DOC_LISTEN_ADMIN_EMAILS
      #   sync: false
      # SQLite 저장소: Render Disk에 사용자/결제코드 상태를 영속 저장합니다.
      - key: DOC_LISTEN_USER_STORE_PATH
        value: /var/data/doclisten/users.sqlite3
      # Google 로그인 키는 Render 대시보드에서 Secret 환경변수로 설정합니다.
      # - key: DOC_LISTEN_BASE_URL
      #   value: https://doclisten.app
      # - key: GOOGLE_CLIENT_ID
      #   sync: false
      # - key: GOOGLE_CLIENT_SECRET
      #   sync: false
    disk:
      name: doclisten-data
      mountPath: /var/data
      sizeGB: 1
