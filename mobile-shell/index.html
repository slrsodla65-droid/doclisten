<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>DocListen</title>
    <meta name="theme-color" content="#070a12" />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #070a12; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      main { width: min(88vw, 420px); text-align: center; }
      .logo { width: 96px; height: 96px; border-radius: 26px; margin: 0 auto 24px; background: linear-gradient(135deg, #7c3aed, #22c55e); display: grid; place-items: center; font-size: 44px; font-weight: 800; }
      a { color: #a78bfa; }
    </style>
    <script>
      window.location.replace('https://doclisten.app/?source=capacitor-fallback');
    </script>
  </head>
  <body>
    <main>
      <div class="logo">▶</div>
      <h1>DocListen을 여는 중입니다</h1>
      <p>자동으로 이동하지 않으면 <a href="https://doclisten.app/?source=capacitor-fallback">여기를 눌러주세요</a>.</p>
    </main>
  </body>
</html>
